apis:
  - name: Penpot RPC API
    description: >
      Penpot's internal RPC-style REST API provides programmatic access to
      projects, files, pages, components, and design assets. Developers
      authenticate with personal access tokens and can query the auto-generated
      API documentation at the /api/_doc endpoint on any Penpot instance.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://penpot.app/integrations-api
    baseURL: https://design.penpot.app/api/rpc/command/
    tags:
      - Design
      - Prototyping
      - Projects
      - Files
      - Components
    properties:
      - type: Documentation
        url: https://help.penpot.app/technical-guide/integration/
      - type: OpenAPI
        url: https://design.penpot.app/api/_doc
      - type: OpenAPI
        url: openapi/penpot-rpc-openapi.yml
      - type: JSONSchema
        url: json-schema/penpot-schemas.json
      - type: Examples
