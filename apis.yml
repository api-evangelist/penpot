        url: json-ld/penpot-context.jsonld
    contact:
      - FN: Penpot Support
        url: https://community.penpot.app/

  - name: Penpot Webhooks
    description: >
      Penpot supports outbound webhooks configured at the team level, delivering
      JSON or Transit-formatted event payloads when actions occur such as file
      creation, file updates, and new comments. All backend RPC calls marked as
      WEBHOOK automatically trigger notifications to registered endpoints.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://help.penpot.app/technical-guide/integration/
    baseURL: https://design.penpot.app/api/rpc/command/
    tags:
      - Webhooks
      - Events
      - Automation
    properties:
      - type: Documentation
        url: https://help.penpot.app/technical-guide/integration/
    contact:
      - FN: Penpot Support
        url: https://community.penpot.app/

  - name: Penpot Plugin API
    description: >
      Penpot's Plugin API allows developers to build and publish custom
      extensions that extend the Penpot design editor. The plugin system
      provides extensive access to design objects and properties, enabling
      external rendering, workflow automation, and enhanced application
      functionality directly within the Penpot UI.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://doc.plugins.penpot.app/
    baseURL: https://doc.plugins.penpot.app/
    tags:
      - Plugins
      - Extensions
      - Design
    properties:
      - type: Documentation
        url: https://doc.plugins.penpot.app/
    contact:
      - FN: Penpot Support
        url: https://community.penpot.app/

