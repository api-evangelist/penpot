aid: penpot
name: Penpot
description: >
  Penpot is an open-source design and prototyping platform built for design
  and code collaboration, offering a self-hostable alternative to Figma. It
  provides a REST RPC API that enables developers to programmatically access
  and manage projects, files, pages, components, and design assets. Authentication
  is handled via personal access tokens, and the platform supports outbound
  webhooks for event-driven integrations triggered by file changes, comments,
  and other workspace activity. Penpot also offers a plugin system and an MCP
  server for AI-assisted design-to-code workflows, making it a flexible
  integration target for modern development toolchains.
