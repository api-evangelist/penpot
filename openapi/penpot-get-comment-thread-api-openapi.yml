openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Get Comment Thread API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Get Comment Thread
paths:
  get-comment-thread:
    post:
      description: null
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: get-comment-thread
              type: object
              properties:
                fileId:
                  $ref: '#/components/schemas/Uuid'
                id:
                  $ref: '#/components/schemas/Uuid'
                shareId:
                  $ref: '#/components/schemas/Uuid'
                  nullable: true
              required:
              - fileId
              - id
            example: '{"fileId":"5ab5eb30-5b3a-81d5-8008-2a395e1bb29f","id":"5ab5eb30-5b3a-81d5-8008-2a395e1bb2a0","shareId":"5ab5eb30-5b3a-81d5-8008-2a395e1bb2a1"}'
      tags:
      - Get Comment Thread
components:
  schemas:
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
