openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Download Font Family API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Download Font Family
paths:
  download-font-family:
    post:
      description: 'Download the entire font family as a zip file. Returns the zip

        bytes on the body, without encoding it on transit or json.'
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: download-font-family
              type: object
              properties:
                fontId:
                  $ref: '#/components/schemas/Uuid'
              required:
              - fontId
            example: '{"fontId":"5ab5eb30-5b3a-81d5-8008-2a395e0ceabe"}'
      tags:
      - Download Font Family
components:
  schemas:
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
