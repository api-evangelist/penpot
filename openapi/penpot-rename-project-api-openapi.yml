openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Rename Project API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Rename Project
paths:
  rename-project:
    post:
      description: null
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: rename-project
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 250
                id:
                  $ref: '#/components/schemas/Uuid'
              required:
              - name
              - id
            example: '{"name":"EFU1tho5Uu3FT8D8TP44SXIYHO5f02oJ480Q7b04ku59H6Bip6","id":"5ab5eb30-5b3a-81d5-8008-2a395c47ec6e"}'
      tags:
      - Rename Project
components:
  schemas:
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
