openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Update File Snapshot API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Update File Snapshot
paths:
  update-file-snapshot:
    post:
      description: null
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: update-file-snapshot
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/Uuid'
                label:
                  $ref: '#/components/schemas/Text'
              required:
              - id
              - label
            example: '{"id":"5ab5eb30-5b3a-81d5-8008-2a395e10bdc5","label":"jykx"}'
      tags:
      - Update File Snapshot
components:
  schemas:
    Text:
      title: string
      description: not whitespace string
      type: string
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
