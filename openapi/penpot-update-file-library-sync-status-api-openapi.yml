openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Update File Library Sync Status API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Update File Library Sync Status
paths:
  update-file-library-sync-status:
    post:
      description: Update the synchronization status of a file->library link
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: update-file-library-sync-status
              type: object
              properties:
                fileId:
                  $ref: '#/components/schemas/Uuid'
                libraryId:
                  $ref: '#/components/schemas/Uuid'
              required:
              - fileId
              - libraryId
            example: '{"fileId":"5ab5eb30-5b3a-81d5-8008-2a395c61eb75","libraryId":"5ab5eb30-5b3a-81d5-8008-2a395c61eb76"}'
      tags:
      - Update File Library Sync Status
components:
  schemas:
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
