openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Update Comment API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Update Comment
paths:
  update-comment:
    post:
      description: null
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: update-comment
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/Uuid'
                content:
                  type: string
                  maxLength: 750
                shareId:
                  $ref: '#/components/schemas/Uuid'
                  nullable: true
                mentions:
                  title: set
                  description: Set of Strings
                  type: array
                  items:
                    $ref: '#/components/schemas/Uuid'
                  uniqueItems: true
              required:
              - id
              - content
            example: '{"id":"5ab5eb30-5b3a-81d5-8008-2a395e1be204","content":"","shareId":null,"mentions":["5ab5eb30-5b3a-81d5-8008-2a395e1c1d2a","5ab5eb30-5b3a-81d5-8008-2a395e1c1d30","5ab5eb30-5b3a-81d5-8008-2a395e1c1d31","5ab5eb30-5b3a-81d5-8008-2a395e1c1d34","5ab5eb30-5b3a-81d5-8008-2a395e1c1d3b","5ab5eb30-5b3a-81d5-8008-2a395e1c1d2c","5ab5eb30-5b3a-81d5-8008-2a395e1c1d2e","5ab5eb30-5b3a-81d5-8008-2a395e1c1d23","5ab5eb30-5b3a-81d5-8008-2a395e1c1d27","5ab5eb30-5b3a-81d5-8008-2a395e1c1d2b","5ab5eb30-5b3a-81d5-8008-2a395e1c1d24","5ab5eb30-5b3a-81d5-8008-2a395e1c1d37","5ab5eb30-5b3a-81d5-8008-2a395e1c1d2f","5ab5eb30-5b3a-81d5-8008-2a395e1c1d28","5ab5eb30-5b3a-81d5-8008-2a395e1c1d3c","5ab5eb30-5b3a-81d5-8008-2a395e1c1d25","5ab5eb30-5b3a-81d5-8008-2a395e1c1d22","5ab5eb30-5b3a-81d5-8008-2a395e1c1d3a","5ab5eb30-5b3a-81d5-8008-2a395e1c1d2d","5ab5eb30-5b3a-81d5-8008-2a395e1c1d26","5ab5eb30-5b3a-81d5-8008-2a395e1c1d38","5ab5eb30-5b3a-81d5-8008-2a395e1c1d36","5ab5eb30-5b3a-81d5-8008-2a395e1c1d39","5ab5eb30-5b3a-81d5-8008-2a395e1c1d35","5ab5eb30-5b3a-81d5-8008-2a395e1c1d29","5ab5eb30-5b3a-81d5-8008-2a395e1c1d33","5ab5eb30-5b3a-81d5-8008-2a395e1c1d32"]}'
      tags:
      - Update Comment
components:
  schemas:
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
