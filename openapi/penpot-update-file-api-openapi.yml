                                          - height
                                          - mtype
                                          - id
                                          additionalProperties: false
                                        hidden:
                                          type: boolean
                                      additionalProperties: false
                                blendMode:
                                  title: enum
                                  type: string
                                  enum:
                                  - hue
                                  - screen
                                  - color
                                  - darken
                                  - saturation
                                  - lighten
                                  - normal
                                  - overlay
                                  - difference
                                  - luminosity
                                  - exclusion
                                  - hard-light
                                  - multiply
                                  - soft-light
                                  - color-dodge
                                  - color-burn
                                interactions:
                                  type: array
