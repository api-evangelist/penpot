                                              nullable: true
                                            color:
                                              title: GridColor
                                              type: object
                                              properties:
                                                color:
                                                  title: HexColor
                                                  description: HEX Color String
                                                  type: string
                                                  format: rgb
                                                opacity:
                                                  $ref: '#/components/schemas/SafeNumber'
                                              required:
                                              - color
                                              - opacity
                                          required:
                                          - color
                                      required:
                                      - type
                                      - display
                                      - params
