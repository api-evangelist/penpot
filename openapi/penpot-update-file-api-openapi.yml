                                          - solid
                                          - mixed
                                          - dashed
                                          - dotted
                                        strokeWidth:
                                          $ref: '#/components/schemas/SafeNumber'
                                        strokeAlignment:
                                          title: enum
                                          type: string
                                          enum:
                                          - center
                                          - inner
                                          - outer
                                        strokeCapStart:
                                          title: enum
                                          type: string
                                          enum:
