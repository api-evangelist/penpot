openapi: 3.0.0
info:
  version: '2.16'
  title: Penpot RPC Add Team To Organization Delete Font API
  description: Penpot RPC-style REST API for projects, files, pages, components, and design assets.
  x-api-id: penpot-rpc
  contact:
    url: https://community.penpot.app/
    name: Penpot Support
  x-humanURL: https://penpot.app/integrations-api
servers:
- url: https://design.penpot.app/api/main/methods
  description: MAIN API
tags:
- name: Delete Font
paths:
  delete-font:
    post:
      description: null
      deprecated: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: delete-font
              type: object
              properties:
                teamId:
                  $ref: '#/components/schemas/Uuid'
                id:
                  $ref: '#/components/schemas/Uuid'
              required:
              - teamId
              - id
            example: '{"teamId":"5ab5eb30-5b3a-81d5-8008-2a395e1b7e57","id":"5ab5eb30-5b3a-81d5-8008-2a395e1b7e58"}'
      tags:
      - Delete Font
components:
  schemas:
    Uuid:
      title: uuid
      description: UUID formatted string
      type: string
      format: uuid
